<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central das Chaves</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f9e400 0%, #e6c800 50%, #d4b300 100%);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 30%, rgba(0, 0, 0, 0.03) 0%, transparent 60%),
                  radial-gradient(circle at 80% 70%, rgba(0, 0, 0, 0.02) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      max-width: 480px;
      width: 100%;
      padding: 50px 35px 40px;
      border-radius: 32px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15),
                  inset 0 1px 0 rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      z-index: 1;
    }

    /* LOGO - MAIOR */
    .logo-loja {
      width: 200px;
      height: auto;
      display: block;
      margin: 0 auto 18px;
      transition: transform 0.3s ease;
    }

    .logo-loja:hover {
      transform: scale(1.05);
    }

    .titulo {
      font-size: 28px;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .titulo span {
      color: #1a1a1a;
    }

    .subtitulo {
      color: #444;
      font-size: 15px;
      font-weight: 300;
      margin-top: 2px;
      margin-bottom: 30px;
      border-bottom: 2px solid rgba(0,0,0,0.06);
      padding-bottom: 16px;
    }

    .subtitulo i {
      color: #1a1a1a;
      margin-right: 6px;
    }

    /* BOTÕES PADRÃO */
    .botao {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background-color: rgba(255, 255, 255, 0.7);
      color: #1a1a1a;
      padding: 16px 18px;
      margin: 12px 0;
      border-radius: 60px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
      border: 2px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(4px);
    }

    .botao i {
      font-size: 26px;
      width: 32px;
      color: #1a1a1a;
      transition: color 0.3s;
    }

    .botao:hover {
      background-color: #9b30ff;
      border-color: #9b30ff;
      color: #ffffff;
      transform: translateY(-3px);
      box-shadow: 0 8px 0 #6a1fb1;
    }

    .botao:hover i {
      color: #ffffff;
    }

    /* WHATSAPP - VERDE VIBRANTE COM PULSO */
    .botao-whatsapp {
      background-color: #25D366;
      border-color: #25D366;
      color: #ffffff;
      box-shadow: 0 4px 0 #1a8c4a;
      position: relative;
    }

    .botao-whatsapp i {
      color: #ffffff;
    }

    .botao-whatsapp::after {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border-radius: 60px;
      background: rgba(37, 211, 102, 0.3);
      z-index: -1;
      animation: pulsar 2s ease-in-out infinite;
    }

    @keyframes pulsar {
      0% {
        transform: scale(1);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.05);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 0.5;
      }
    }

    .botao-whatsapp:hover {
      background-color: #34e07a;
      border-color: #34e07a;
      box-shadow: 0 8px 0 #1a8c4a;
      transform: translateY(-3px) scale(1.02);
    }

    .botao-whatsapp:hover i {
      color: #ffffff;
    }

    .botao-whatsapp:hover::after {
      animation: none;
    }

    /* RODAPÉ */
    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: #555;
      border-top: 1px solid rgba(0,0,0,0.06);
      padding-top: 18px;
      font-weight: 300;
      line-height: 1.8;
    }

    .footer strong {
      color: #1a1a1a;
      font-weight: 600;
    }

    .footer .endereco {
      color: #1a1a1a;
      font-weight: 400;
      font-size: 14px;
      display: block;
      margin-top: 4px;
    }

    .footer i {
      color: #1a1a1a;
      margin-right: 4px;
    }

    @media (max-width: 480px) {
      .container {
        padding: 35px 20px 30px;
        background: rgba(255, 255, 255, 0.80);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .titulo {
        font-size: 24px;
      }
      .botao {
        font-size: 16px;
        padding: 14px 14px;
      }
      .logo-loja {
        width: 150px;
      }
    }
  </style>
</head>
<body>
